name: Verify

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  verify:
    name: Typecheck, Lint, Format, Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm verify
